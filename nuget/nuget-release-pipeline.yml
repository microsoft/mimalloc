# Microsoft.Mimalloc NuGet Release Pipeline
# Manually triggered pipeline to build, sign, and publish the mimalloc NuGet package.
# Builds x64 and ARM64 Windows binaries, signs via ESRP, and packs NuGet.

trigger: none
pr: none

parameters:
  - name: version
    displayName: 'NuGet package version'
    type: string
    default: '1.0.0'

  - name: buildConfig
    displayName: 'Build configuration'
    type: string
    default: 'Release'
    values:
      - Release
      - Debug

  - name: signBinaries
    displayName: 'Sign binaries (ESRP)?'
    type: string
    default: 'No'
    values:
      - 'Yes'
      - 'No'

  - name: publishToFeed
    displayName: 'Publish NuGet to artifact feed?'
    type: boolean
    default: false

variables:
  nuspecPath: '$(Build.SourcesDirectory)/nuget/Microsoft.Mimalloc.nuspec'
  artifactStaging: '$(Build.ArtifactStagingDirectory)'

stages:

  # ============================================================
  # Stage 1: Build x64 and ARM64
  # ============================================================
  - stage: Build
    displayName: 'Build mimalloc (x64 + ARM64)'
    jobs:

      # --- x64 Build ---
      - job: Build_x64
        displayName: 'Build x64'
        pool:
          vmImage: 'windows-latest'
        steps:
          - checkout: self

          - task: CMake@1
            displayName: 'CMake configure (x64)'
            inputs:
              workingDirectory: '$(Build.SourcesDirectory)/build-x64'
              cmakeArgs: '.. -A x64 -DMI_BUILD_TESTS=OFF'

          - task: CMake@1
            displayName: 'CMake build (x64 ${{ parameters.buildConfig }})'
            inputs:
              workingDirectory: '$(Build.SourcesDirectory)/build-x64'
              cmakeArgs: '--build . --config ${{ parameters.buildConfig }} --parallel'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish x64 binaries'
            inputs:
              targetPath: '$(Build.SourcesDirectory)/build-x64/${{ parameters.buildConfig }}'
              artifactName: 'binaries-x64'

      # --- ARM64 Build (cross-compilation) ---
      - job: Build_ARM64
        displayName: 'Build ARM64'
        pool:
          vmImage: 'windows-latest'
        steps:
          - checkout: self

          - task: CMake@1
            displayName: 'CMake configure (ARM64)'
            inputs:
              workingDirectory: '$(Build.SourcesDirectory)/build-arm64'
              cmakeArgs: '.. -A ARM64 -DMI_BUILD_TESTS=OFF'

          - task: CMake@1
            displayName: 'CMake build (ARM64 ${{ parameters.buildConfig }})'
            inputs:
              workingDirectory: '$(Build.SourcesDirectory)/build-arm64'
              cmakeArgs: '--build . --config ${{ parameters.buildConfig }} --parallel'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish ARM64 binaries'
            inputs:
              targetPath: '$(Build.SourcesDirectory)/build-arm64/${{ parameters.buildConfig }}'
              artifactName: 'binaries-arm64'

  # ============================================================
  # Stage 2: Sign binaries via ESRP (optional)
  # ============================================================
  - ${{ if eq(parameters.signBinaries, 'Yes') }}:
    - stage: Sign
      displayName: 'Sign binaries (ESRP)'
      dependsOn: Build
      jobs:
        - job: SignBinaries
          displayName: 'ESRP Authenticode signing'
          pool:
            vmImage: 'windows-latest'
          steps:
            - checkout: none

            # Download build artifacts
            - task: DownloadPipelineArtifact@2
              displayName: 'Download x64 binaries'
              inputs:
                artifactName: 'binaries-x64'
                targetPath: '$(Pipeline.Workspace)/binaries-x64'

            - task: DownloadPipelineArtifact@2
              displayName: 'Download ARM64 binaries'
              inputs:
                artifactName: 'binaries-arm64'
                targetPath: '$(Pipeline.Workspace)/binaries-arm64'

            # Sign x64 DLL
            - task: EsrpCodeSigning@5
              displayName: 'Sign x64 binaries'
              inputs:
                ConnectedServiceName: 'ESRP-CodeSigning'
                AppRegistrationClientId: '$(EsrpClientId)'
                AppRegistrationTenantId: '$(EsrpTenantId)'
                AuthAKVName: '$(EsrpKeyVaultName)'
                AuthCertName: '$(EsrpAuthCertName)'
                AuthSignCertName: '$(EsrpSignCertName)'
                FolderPath: '$(Pipeline.Workspace)/binaries-x64'
                Pattern: '*.dll'
                signConfigType: 'inlineSignParams'
                inlineOperation: |
                  [
                    {
                      "KeyCode": "$(EsrpKeyCode)",
                      "OperationCode": "SigntoolSign",
                      "Parameters": {
                        "OpusName": "Microsoft",
                        "OpusInfo": "https://github.com/microsoft/mimalloc",
                        "FileDigest": "/fd \"SHA256\"",
                        "PageHash": "/NPH",
                        "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                      },
                      "ToolName": "sign",
                      "ToolVersion": "1.0"
                    },
                    {
                      "KeyCode": "$(EsrpKeyCode)",
                      "OperationCode": "SigntoolVerify",
                      "Parameters": {},
                      "ToolName": "sign",
                      "ToolVersion": "1.0"
                    }
                  ]

            # Sign ARM64 DLL
            - task: EsrpCodeSigning@5
              displayName: 'Sign ARM64 binaries'
              inputs:
                ConnectedServiceName: 'ESRP-CodeSigning'
                AppRegistrationClientId: '$(EsrpClientId)'
                AppRegistrationTenantId: '$(EsrpTenantId)'
                AuthAKVName: '$(EsrpKeyVaultName)'
                AuthCertName: '$(EsrpAuthCertName)'
                AuthSignCertName: '$(EsrpSignCertName)'
                FolderPath: '$(Pipeline.Workspace)/binaries-arm64'
                Pattern: '*.dll'
                signConfigType: 'inlineSignParams'
                inlineOperation: |
                  [
                    {
                      "KeyCode": "$(EsrpKeyCode)",
                      "OperationCode": "SigntoolSign",
                      "Parameters": {
                        "OpusName": "Microsoft",
                        "OpusInfo": "https://github.com/microsoft/mimalloc",
                        "FileDigest": "/fd \"SHA256\"",
                        "PageHash": "/NPH",
                        "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                      },
                      "ToolName": "sign",
                      "ToolVersion": "1.0"
                    },
                    {
                      "KeyCode": "$(EsrpKeyCode)",
                      "OperationCode": "SigntoolVerify",
                      "Parameters": {},
                      "ToolName": "sign",
                      "ToolVersion": "1.0"
                    }
                  ]

            # Re-publish signed binaries
            - task: PublishPipelineArtifact@1
              displayName: 'Publish signed x64 binaries'
              inputs:
                targetPath: '$(Pipeline.Workspace)/binaries-x64'
                artifactName: 'signed-binaries-x64'

            - task: PublishPipelineArtifact@1
              displayName: 'Publish signed ARM64 binaries'
              inputs:
                targetPath: '$(Pipeline.Workspace)/binaries-arm64'
                artifactName: 'signed-binaries-arm64'

  # ============================================================
  # Stage 3: Pack and publish NuGet
  # ============================================================
  - stage: Pack
    displayName: 'Pack & Publish NuGet'
    dependsOn:
      - Build
      - ${{ if eq(parameters.signBinaries, 'Yes') }}:
        - Sign
    jobs:
      - job: PackNuGet
        displayName: 'NuGet pack & publish'
        pool:
          vmImage: 'windows-latest'
        variables:
          ${{ if eq(parameters.signBinaries, 'Yes') }}:
            x64Artifact: 'signed-binaries-x64'
            arm64Artifact: 'signed-binaries-arm64'
          ${{ else }}:
            x64Artifact: 'binaries-x64'
            arm64Artifact: 'binaries-arm64'
        steps:
          - checkout: self

          # Download binaries (signed or unsigned depending on parameter)
          - task: DownloadPipelineArtifact@2
            displayName: 'Download x64 binaries'
            inputs:
              artifactName: '$(x64Artifact)'
              targetPath: '$(Build.SourcesDirectory)/build-x64/${{ parameters.buildConfig }}'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download ARM64 binaries'
            inputs:
              artifactName: '$(arm64Artifact)'
              targetPath: '$(Build.SourcesDirectory)/build-arm64/${{ parameters.buildConfig }}'

          # Pack NuGet
          - task: NuGetToolInstaller@1
            displayName: 'Install NuGet'

          - script: |
              nuget pack "$(nuspecPath)" -Version ${{ parameters.version }} -OutputDirectory "$(artifactStaging)" -NoPackageAnalysis
            displayName: 'NuGet pack (v${{ parameters.version }})'

          # Publish .nupkg as pipeline artifact
          - task: PublishPipelineArtifact@1
            displayName: 'Publish NuGet package artifact'
            inputs:
              targetPath: '$(artifactStaging)'
              artifactName: 'nuget-package'

          # Optional: push to ADO artifact feed
          - ${{ if eq(parameters.publishToFeed, true) }}:
            - task: NuGetCommand@2
              displayName: 'Push to artifact feed'
              inputs:
                command: 'push'
                packagesToPush: '$(artifactStaging)/**/*.nupkg'
                nuGetFeedType: 'internal'
                publishVstsFeed: 'mimalloc'
